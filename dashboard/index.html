<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/etteum.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="color-scheme" content="dark light" />
    <meta name="theme-color" content="#030304" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f4f4f5" media="(prefers-color-scheme: light)" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Etteum Dashboard</title>
    <script>
      // No-flash theme: apply the saved theme before first paint. Dark is default.
      (function () {
        try {
          var t = localStorage.getItem("poolprox-theme");
          if (t === "light") {
            document.documentElement.classList.add("light");
            // Update theme-color for light mode
            var metas = document.querySelectorAll('meta[name="theme-color"]');
            if (metas.length > 0) metas[0].setAttribute("content", "#f4f4f5");
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
